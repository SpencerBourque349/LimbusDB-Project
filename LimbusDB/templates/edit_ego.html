<!DOCTYPE html>
<html>
<head>
    <title>Edit Ego</title>
    <style>
        body {
            background-color: #29201F;
            color: white;
            text-align: center;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .banner {
            background-color: #b01c37;
            padding: 20px 0;
            font-size: 2em;
            font-weight: bold;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>

<div class="banner">Limbus Database</div>
<h1>Edit Ego</h1>

{% include 'nav_buttons.html' %}

<!-- ✅ ONLY ONE FORM -->
<form method="POST">

    <!-- Name -->
    Name:
    <input type="text" name="ego_name" value="{{ ego.ego_name }}"><br><br>

    <!-- Sinner -->
    Sinner:
    <select name="sinner_id">
        {% for s in sinners %}
        <option value="{{ s.sinner_id }}"
            {% if s.sinner_id == ego.sinner_id %} selected {% endif %}>
            {{ s.sinner_name }}
        </option>
        {% endfor %}
    </select><br><br>

    <!-- Class -->
    Class:
    <input type="text" name="class" value="{{ ego.class }}"><br><br>

    <!-- Season -->
    Season:
    <input type="text" name="season_released" value="{{ ego.season_released }}"><br><br>

    <!-- Acquisition -->
    Acquisition:
    <input type="text" name="acquisition" value="{{ ego.acquisition }}"><br><br>

    <hr>

    <!-- Affinities -->
    <h3>Affinities</h3>
    {% for a in affinities %}
        <input type="checkbox" name="affinities" value="{{ a.affinity_name }}"
            {% if a.affinity_name in current_aff %} checked {% endif %}>
        {{ a.affinity_name }}<br>
    {% endfor %}

    <br>

    <!-- Status Effects -->
    <h3>Status Effects</h3>
    {% for s in statuses %}
        <input type="checkbox" name="statuses" value="{{ s.keyword_name }}"
            {% if s.keyword_name in current_stat %} checked {% endif %}>
        {{ s.keyword_name }}<br>
    {% endfor %}

    <br>

    <input type="submit" value="Update EGO">

</form>

</body>
</html>
