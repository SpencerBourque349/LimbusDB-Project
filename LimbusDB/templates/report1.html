<html>
<head>
    <title>Identities per Sinner</title>
    <style>
        body {
            background-color: #29201F;
            color: white;
            text-align: center;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .banner {
            background-color: #b01c37;
            padding: 20px 0;
            font-size: 2em;
            font-weight: bold;
            letter-spacing: 2px;
        }
        a { color: #fff; }
        table { margin: 0 auto; color: white; }
        th, td { padding: 8px; }
    </style>
</head>
<body>
    <div class="banner">Limbus Database</div>
    <h1>Identities per Sinner</h1>
    {% include 'nav_buttons.html' %}
    <table border="1">
    <tr>
        <th>Sinner</th>
        <th>Total</th>
    </tr>
    {% for row in data %}
    <tr>
        <td><a href="{{ url_for('sinner_detail', id=row.sinner_id) }}">{{ row.sinner_name }}</a></td>
        <td>{{ row.total }}</td>
    </tr>
    {% endfor %}
    </table>
</body>
</html>
