<html>
<head>
    <title>Add Identity</title>
    <style>
        body {
            background-color: #29201F;
            color: white;
            text-align: center;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .banner {
            background-color: #b01c37;
            padding: 20px 0;
            font-size: 2em;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .nav-links {
            margin: 14px 0 18px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .nav-button {
            display: inline-block;
            padding: 8px 16px;
            background-color: #444;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
        }
        .nav-button:hover {
            background-color: #666;
        }
        a { color: #fff; }
    </style>
</head>
<body>
    <div class="banner">Limbus Database</div>
    <h1>Add Identity</h1>
    <form method="POST">
        Name: <input type="text" name="identity_name"><br>
        Sinner:
        <select name="sinner_id">
            {% for s in sinners %}
            <option value="{{ s.sinner_id }}">{{ s.sinner_name }}</option>
            {% endfor %}
        </select><br>
        <h3>Affinities</h3>
        {% for a in affinities %}
            <input type="checkbox" name="affinities" value="{{ a.affinity_name }}">
            {{ a.affinity_name }}<br>
        {% endfor %}
        <h3>Status Effects</h3>
        {% for s in statuses %}
            <input type="checkbox" name="statuses" value="{{ s.keyword_name }}">
            {{ s.keyword_name }}<br>
        {% endfor %}
        Rarity: <input type="text" name="rarity"><br>
        Season: <input type="text" name="season_released"><br>
        Acquisition: <input type="text" name="acquisition"><br>
        <input type="submit">
    </form>
    <div class="nav-links">
        <a href="/home" class="nav-button">Home</a>
    </div>
</body>
</html>
